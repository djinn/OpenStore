on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        run: make build

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp ./minio ./dist/openstore-linux-amd64
          sha256sum ./dist/openstore-linux-amd64 > ./dist/openstore-linux-amd64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openstore-linux-amd64
            dist/openstore-linux-amd64.sha256
          generate_release_notes: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          TAG="ghcr.io/${{ github.repository_owner }}/openstore:${{ github.ref_name }}"
          docker build -t "${TAG}" .
          docker push "${TAG}"
