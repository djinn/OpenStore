on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build binary
        run: make build

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp ./minio ./dist/openstore-linux-amd64
          sha256sum ./dist/openstore-linux-amd64 > ./dist/openstore-linux-amd64.sha256

      - name: Prepare Docker build context
        run: |
          RELEASE="${{ github.ref_name }}"
          ARCH="amd64"
          BIN="minio-${ARCH}.${RELEASE}"
          cp ./minio "./${BIN}"
          sha256sum < "./${BIN}" | sed "s, -,${BIN},g" > "./${BIN}.sha256sum"
          # Signature file is expected by Dockerfile; release workflow does not sign artifacts.
          touch "./${BIN}.minisig"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/openstore-linux-amd64
            dist/openstore-linux-amd64.sha256
          generate_release_notes: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          TAG="ghcr.io/${{ github.repository_owner }}/openstore:${{ github.ref_name }}"
          docker build --build-arg TARGETARCH=amd64 --build-arg RELEASE="${{ github.ref_name }}" -t "${TAG}" .
          docker push "${TAG}"
